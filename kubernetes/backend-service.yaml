apiVersion: v1
kind: Service
metadata:
  name: backend
  labels:
    app: backend
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "5000"
    prometheus.io/path: "/metrics"
spec:
  selector:
    app: backend
  type: NodePort
  ports:
    - name: http
      port: 5000
      targetPort: 5000
      nodePort: 31500
      protocol: TCP