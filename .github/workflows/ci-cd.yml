name: DevOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: chaninduimanjith/cloud-native-devops-backend:latest

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: chaninduimanjith/cloud-native-devops-frontend:latest

  deploy-ec2:
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 Free-Tier Instance
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd cloud-native-devops-platform
            git pull origin main
            sudo docker pull chaninduimanjith/cloud-native-devops-frontend:latest
            sudo docker pull chaninduimanjith/cloud-native-devops-backend:latest
            sudo docker rm -f frontend backend || true
            sudo docker network create app-network || true
            sudo docker run -d --name backend --network app-network --restart unless-stopped -p 5000:5000 chaninduimanjith/cloud-native-devops-backend:latest
            sudo docker run -d --name frontend --network app-network --restart unless-stopped -p 3000:3000 chaninduimanjith/cloud-native-devops-frontend:latest
            echo "Deployment complete!"