apiVersion: v1
kind: Secret
metadata:
  name: alertmanager-config
  namespace: monitoring
  labels:
    release: monitoring
type: Opaque
stringData:
  # ─────────────────────────────────────────────────────────────────────────────
  # INSTRUCTIONS:
  #   Replace all <PLACEHOLDER> values before applying.
  #
  #   Email:
  #     - smtp_smarthost: your SMTP host, e.g. smtp.gmail.com:587
  #     - smtp_from / to: your email addresses
  #     - smtp_auth_username / password: SMTP credentials
  #       (For Gmail use an App Password: https://myaccount.google.com/apppasswords)
  #
  #   Slack:
  #     - api_url: Incoming Webhook URL from your Slack app
  #       (Create one at: https://api.slack.com/apps → Incoming Webhooks)
  #     - channel: Slack channel name, e.g. #alerts
  # ─────────────────────────────────────────────────────────────────────────────
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m
      smtp_smarthost: 'smtp.gmail.com:587'
      smtp_from: '<YOUR_EMAIL@gmail.com>'
      smtp_auth_username: '<YOUR_EMAIL@gmail.com>'
      smtp_auth_password: '<YOUR_GMAIL_APP_PASSWORD>'
      smtp_require_tls: true

    templates:
      - '/etc/alertmanager/config/*.tmpl'

    route:
      group_by: ['alertname', 'severity']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 12h
      receiver: 'default-receiver'

      routes:
        # Critical alerts go to both email AND Slack
        - match:
            severity: critical
          receiver: 'critical-receiver'
          continue: false

        # Warning alerts go to Slack only
        - match:
            severity: warning
          receiver: 'warning-receiver'
          continue: false

    receivers:
      - name: 'default-receiver'
        slack_configs:
          - api_url: '<YOUR_SLACK_WEBHOOK_URL>'
            channel: '#alerts'
            send_resolved: true
            title: '{{ template "slack.default.title" . }}'
            text: '{{ template "slack.default.text" . }}'

      - name: 'critical-receiver'
        email_configs:
          - to: '<YOUR_EMAIL@gmail.com>'
            send_resolved: true
            headers:
              Subject: '🚨 [CRITICAL] {{ .GroupLabels.alertname }}'
        slack_configs:
          - api_url: '<YOUR_SLACK_WEBHOOK_URL>'
            channel: '#alerts'
            send_resolved: true
            color: '{{ if eq .Status "firing" }}danger{{ else }}good{{ end }}'
            title: '🚨 CRITICAL: {{ .GroupLabels.alertname }}'
            text: |
              *Status:* {{ .Status | toUpper }}
              *Alerts:*
              {{ range .Alerts }}
              • *{{ .Labels.alertname }}* — {{ .Annotations.summary }}
                {{ .Annotations.description }}
              {{ end }}

      - name: 'warning-receiver'
        slack_configs:
          - api_url: '<YOUR_SLACK_WEBHOOK_URL>'
            channel: '#alerts'
            send_resolved: true
            color: '{{ if eq .Status "firing" }}warning{{ else }}good{{ end }}'
            title: '⚠️ WARNING: {{ .GroupLabels.alertname }}'
            text: |
              *Status:* {{ .Status | toUpper }}
              *Alerts:*
              {{ range .Alerts }}
              • *{{ .Labels.alertname }}* — {{ .Annotations.summary }}
                {{ .Annotations.description }}
              {{ end }}

    inhibit_rules:
      # Suppress warning alerts when a critical alert of the same name fires
      - source_match:
          severity: critical
        target_match:
          severity: warning
        equal: ['alertname']
